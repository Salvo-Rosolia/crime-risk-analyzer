version: 2
updates:
  # GitHub Actions: tiene aggiornati i pin a SHA delle action usate in ci.yml.
  # Dependabot apre PR che spostano lo SHA al commit del nuovo tag, mantenendo
  # il commento del tag leggibile. Le PR passano comunque da ci-gate.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  # Dipendenze Python del backend (gestite con uv: pyproject.toml + uv.lock).
  # Si attiva quando backend/ con i manifest arriva su main (PR #38).
  # Minor e patch raggruppate in un'unica PR per ridurre il rumore; i major
  # restano PR singole per valutarli uno a uno.
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(backend)"
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Dipendenze npm del frontend (Angular: package.json + package-lock.json).
  # Stesso schema del backend: minor e patch raggruppate in un'unica PR per
  # ridurre il rumore; i major restano PR singole per valutarli uno a uno.
  # Le PR passano comunque da ci-gate.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(frontend)"
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major sospesi: la UI non e' finita e l'upgrade (es. Angular 20->22, o
      # TypeScript 5.x->7.x) va affrontato come migrazione dedicata, non a colpi
      # di PR settimanali. Minor/patch continuano a essere raggruppate sopra.
      # Rimuovere questi ignore quando l'upgrade Angular entra in roadmap.
      - dependency-name: "@angular/*"
        update-types:
          - "version-update:semver-major"
      # angular-eslint segue la major di Angular: gia' dal primo MINOR (21.1.0)
      # aggiunge il peer "@angular/cli >=21 <22", incompatibile con Angular 20
      # pinnato -> `npm ci` fallisce con ERESOLVE (cfr. PR #178 e la precedente
      # #161 chiuse). Congelato quindi a 21.0.x (solo patch) finche' l'upgrade
      # Angular 21 non entra in roadmap.
      - dependency-name: "@angular-eslint/*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "angular-eslint"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      # eslint major (es. 10.x) e' fuori dal peer di angular-eslint 21
      # ("^8.57.0 || ^9.0.0") -> il bump rompe `npm ci` (cfr. PR #179 chiusa).
      # Restano minor/patch della linea 9.x. Rimuovere con l'upgrade angular-eslint.
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      # typescript-eslint major (es. 9.x) uscirebbe dal peer di angular-eslint 21
      # ("typescript-eslint: ^8.0.0") -> stesso ERESOLVE di eslint major (rischio
      # latente, oggi siamo su 8.x). Restano minor/patch della linea 8.x.
      # Rimuovere con l'upgrade angular-eslint.
      - dependency-name: "typescript-eslint"
        update-types:
          - "version-update:semver-major"
