name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Quality checks
        run: uv run python scripts/check.py
      - name: Audit dipendenze (pip-audit)
        # Esporta il set di dipendenze bloccate (uv.lock) e lo passa a pip-audit.
        # Blocca la lane se emerge una vulnerabilita nota (nessuna oggi).
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes > "$RUNNER_TEMP/requirements.txt"
          uvx pip-audit -r "$RUNNER_TEMP/requirements.txt"

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Detect frontend tooling
        id: tooling
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "package.json trovato: eseguo lint + test."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Tooling FE non ancora presente (nessun package.json): skip-pass."
          fi
      - name: Setup Node
        if: ${{ steps.tooling.outputs.present == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: "frontend/.nvmrc"
      - name: Install dependencies
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm ci
      - name: Audit dipendenze (npm audit)
        # Blocca solo su vulnerabilita high/critical; le low restano informative.
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm audit --audit-level=high
      - name: Lint
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm run lint
      - name: Tests (con coverage + soglia)
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm run test:coverage

  frontend-build:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Detect frontend tooling
        id: tooling
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "package.json trovato: eseguo build + format check."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Tooling FE non ancora presente (nessun package.json): skip-pass."
          fi
      - name: Setup Node
        if: ${{ steps.tooling.outputs.present == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: "frontend/.nvmrc"
      - name: Install dependencies
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm ci
      - name: Build (ng build, configurazione production)
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm run build
      - name: Format check (prettier)
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm run format:check

  frontend-e2e:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Detect frontend tooling
        id: tooling
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "package.json trovato: eseguo gli E2E Playwright."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Tooling FE non ancora presente (nessun package.json): skip-pass."
          fi
      - name: Setup Node
        if: ${{ steps.tooling.outputs.present == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: "frontend/.nvmrc"
      - name: Install dependencies
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm ci
      - name: Install Playwright browser (chromium)
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npx playwright install --with-deps chromium
      - name: E2E (Playwright build di produzione + server statico + chromium)
        # `npm run e2e` avvia il webServer di Playwright (ng build + http-server su
        # :4200) e gira gli spec; in CI (CI=true) non riusa server esistenti.
        if: ${{ steps.tooling.outputs.present == 'true' }}
        run: npm run e2e

  ci-gate:
    needs: [changes, backend, frontend, frontend-build, frontend-e2e]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify lane results
        run: |
          changes_result="${{ needs.changes.result }}"
          backend_result="${{ needs.backend.result }}"
          frontend_result="${{ needs.frontend.result }}"
          frontend_build_result="${{ needs['frontend-build'].result }}"
          frontend_e2e_result="${{ needs['frontend-e2e'].result }}"
          echo "changes        = $changes_result"
          echo "backend        = $backend_result"
          echo "frontend       = $frontend_result"
          echo "frontend-build = $frontend_build_result"
          echo "frontend-e2e   = $frontend_e2e_result"
          for r in "$changes_result" "$backend_result" "$frontend_result" "$frontend_build_result" "$frontend_e2e_result"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Un job CI non e stato superato ($r). Gate ROSSO."
              exit 1
            fi
          done
          echo "Tutti i job sono success o skipped. Gate VERDE."
