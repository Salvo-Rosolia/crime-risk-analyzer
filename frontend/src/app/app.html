<header class="cra-header">
  <span class="cra-title">◆ Crime Risk Analyzer</span>
  <span class="cra-tagline">supporto decisionale · human-in-the-loop</span>
  <span class="cra-header-spacer"></span>
  <cra-header-controls
    [data]="store.completoData()"
    [mode]="store.mode()"
    [filter]="store.filter()"
    [loading]="store.screen() === 'LOADING'"
    (setFilter)="onSetFilter($event)"
    (clearFilter)="onClearFilter()"
    (toggleMode)="onToggleMode($event)"
  />
</header>

<cra-map
  [data]="store.completoData()"
  [filter]="store.filter()"
  [selectedId]="store.selectedPoiId()"
  (poiClick)="onPoiClick($event)"
/>

<section class="cra-panels">
  @if (store.screen() === 'RESULTS' || store.screen() === 'FILTER' || store.screen() === 'DETAIL') {
    <!--
      RESULTS, FILTER e DETAIL condividono lo stesso dock (Lista POI + Vista Dettaglio, #199) e
      bottom-sheet narrativa (anziché @case distinti): selezionare/deselezionare un POI o cambiare
      filtro non deve smontare/rimontare cra-panel-dock o cra-narrative-sheet (niente reset dello
      scroll/collasso — stessa ragione dell'unificazione RESULTS/FILTER di #66, estesa qui a
      DETAIL). Il Dettaglio non è più un pannello flottante separato: è una VISTA dentro il dock,
      mostrata quando c'è un POI selezionato (`selectedDetail`), che il dock stesso alterna con la
      Vista Lista senza smontarsi (`panel-dock.component.ts`).
    -->
    <cra-panel-dock
      [pois]="store.completoData()?.poi ?? []"
      [filter]="store.filter()"
      [selectedId]="store.selectedPoiId()"
      [detail]="selectedDetail()"
      [riskModels]="store.completoData()?.risk_models ?? []"
      [open]="store.poiPanelOpen()"
      [narrOpen]="store.narrOpen()"
      (selectPoi)="onPoiClick($event)"
      (setFilter)="onSetFilter($event)"
      (clearFilter)="onClearFilter()"
      (closeDetail)="onCloseDetail()"
      (toggleOpen)="onTogglePoiPanel()"
      (resetConfirmed)="onResetConfirmed()"
    />

    <cra-narrative-sheet
      [citta]="store.completoData()?.citta ?? null"
      [zona]="store.completoData()?.zona_normalizzata ?? null"
      [narrativa]="store.completoData()?.narrativa ?? ''"
      [narrativaFonti]="store.completoData()?.narrativa_fonti ?? null"
      [riskModels]="store.completoData()?.risk_models ?? []"
      [open]="store.narrOpen()"
      (toggleNarrative)="onToggleNarr()"
      (regenerate)="onRegenerate()"
    />
  } @else {
    @switch (store.screen()) {
      @case ('INPUT') {
        <div class="cra-panel">
          <cra-input-panel
            [initialCitta]="store.pendingCitta()"
            [initialZona]="store.pendingZona()"
            [initialDomanda]="store.pendingDomanda()"
            (analyze)="onAnalyze($event)"
          />
        </div>
      }
      @case ('LOADING') {
        <cra-loading-overlay [zona]="store.pendingZona()" />
      }
      @case ('ERROR') {
        <div class="cra-panel">
          <cra-input-panel
            [initialCitta]="store.pendingCitta()"
            [initialZona]="store.pendingZona()"
            [initialDomanda]="store.pendingDomanda()"
            [serverError]="store.error()"
            (analyze)="onAnalyze($event)"
          />
        </div>
      }
      @case ('BASE') {
        <!--
          Stato Sistema base gestisce errore + retry da sé (bloccante 2 review #67): niente
          Stato Errore condiviso col form del sistema completo, che ritenterebbe su /analyze
          invece che su /analyze/baseline. `error` arriva da LOAD_ERROR quando mode==='base'
          (transition.ts la instrada qui invece che su ERROR).
        -->
        <cra-base-panel
          [data]="store.baselineData()"
          [serverError]="store.error()"
          [initialCitta]="store.pendingCitta()"
          [initialZona]="store.pendingZona()"
          (analyzeBaseline)="onBaseSearch($event)"
        />
      }
    }
  }
</section>
